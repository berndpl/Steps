name: Steps
options:
  bundleIdPrefix: de.plontsch
  deploymentTarget:
    iOS: "26.5"
    watchOS: "26.5"
  createIntermediateGroups: true

schemes:
  Steps:
    build:
      targets:
        Steps: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  StepsWatch:
    build:
      targets:
        StepsWatch: all
    run:
      config: Debug
    archive:
      config: Release

# Signing identity lives in a gitignored Local.xcconfig (DEVELOPMENT_TEAM), so the
# public repo carries no identity yet device builds survive `xcodegen generate`.
# Copy nothing — just create Local.xcconfig with `DEVELOPMENT_TEAM = <yourID>`.
# (Build settings here intentionally do NOT set DEVELOPMENT_TEAM, so the xcconfig
# value isn't overridden.)
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Steps:
    type: application
    platform: iOS
    sources:
      - path: Steps
      - path: StepsWidget/StepsGridView.swift   # shared so the app can preview the widget grid
    dependencies:
      - target: StepsWidgetExtension
      - target: StepsWatch          # embed the watch app so it installs together
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.plontsch.Steps
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Shows your step count on the home-screen grid."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Steps notes the places you dwell to suggest round trips that reach your daily step goal."
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Steps uses low-power visit detection in the background to log where you dwell, so it can suggest round trips that reach your daily step goal. Location never leaves your phone except for map lookups."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: Steps/Steps.entitlements
      properties:
        com.apple.developer.healthkit: true
        # Lets HealthKit wake the app when new step samples arrive, so the
        # observer can refresh the cache and reload the widget while closed.
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.de.plontsch.steps

  StepsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StepsWidget
      - path: Steps/HealthKitService.swift
      - path: Steps/GridStyle.swift          # shared: OKLCH ramp, GridStyle, shapes, palettes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.plontsch.Steps.StepsWidget
        PRODUCT_NAME: StepsWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StepsWidget/Info.plist
        SKIP_INSTALL: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: StepsWidget/StepsWidget.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.de.plontsch.steps

  # --- watchOS app + complications (Phase 2) ---
  StepsWatch:
    type: application
    platform: watchOS
    sources:
      - path: StepsWatch
      - path: Steps/HealthKitService.swift   # shared: HealthKit, stages, App Group
      - path: Steps/GridStyle.swift          # shared: SettingsStore depends on these types
      - path: StepsWidget/StepsGridView.swift  # shared: grid + badges, same as iOS widget
      - path: Steps/ThemeSync.swift          # shared: WatchConnectivity theme sync
      - path: Steps/AppIcon.icon             # shared Icon Composer icon (declares watchOS support)
    dependencies:
      - target: StepsWatchWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.plontsch.Steps.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"          # Apple Watch
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: de.plontsch.Steps
        INFOPLIST_KEY_CFBundleDisplayName: Steps
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Shows your step count on the watch."
    entitlements:
      path: StepsWatch/StepsWatch.entitlements
      properties:
        # No App Group: the watch reads HealthKit directly (the cache doesn't sync
        # across devices), and the code falls back gracefully without the suite.
        com.apple.developer.healthkit: true

  StepsWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: StepsWatchWidget
      - path: StepsWidget/StepsAccessoryViews.swift     # shared Ring / Tiny views
      - path: StepsWidget/StepsAccessoryWidgets.swift   # shared provider + widgets
      - path: StepsWidget/StepsGridComplication.swift   # shared grid complication (rectangular)
      - path: Steps/HealthKitService.swift
      - path: Steps/GridStyle.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.plontsch.Steps.watchkitapp.StepsWatchWidget
        PRODUCT_NAME: StepsWatchWidget
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StepsWatchWidget/Info.plist
        SKIP_INSTALL: YES
    entitlements:
      path: StepsWatchWidget/StepsWatchWidget.entitlements
      properties:
        com.apple.developer.healthkit: true
