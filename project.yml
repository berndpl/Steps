name: Steps
options:
  bundleIdPrefix: de.plontsch
  deploymentTarget:
    iOS: "26.5"
  createIntermediateGroups: true

schemes:
  Steps:
    build:
      targets:
        Steps: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    # Set your own Apple Developer Team in Xcode (Signing & Capabilities) to build
    # on device. Left blank intentionally so this public repo carries no identity.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Steps:
    type: application
    platform: iOS
    sources:
      - path: Steps
      - path: StepsWidget/StepsGridView.swift   # shared so the app can preview the widget grid
    dependencies:
      - target: StepsWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.plontsch.Steps
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Shows your step count on the home-screen grid."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    entitlements:
      path: Steps/Steps.entitlements
      properties:
        com.apple.developer.healthkit: true
        # Lets HealthKit wake the app when new step samples arrive, so the
        # observer can refresh the cache and reload the widget while closed.
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.de.plontsch.steps

  StepsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: StepsWidget
      - path: Steps/HealthKitService.swift
      - path: Steps/GridStyle.swift          # shared: OKLCH ramp, GridStyle, shapes, palettes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.plontsch.Steps.StepsWidget
        PRODUCT_NAME: StepsWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: StepsWidget/Info.plist
        SKIP_INSTALL: YES
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: StepsWidget/StepsWidget.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.security.application-groups:
          - group.de.plontsch.steps
